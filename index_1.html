  }).join("");
  const blank = Array(Math.max(0,10-d.items.length)).fill('<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>').join("");

    return `<tr><td class="lb">収集品目</td><td colspan="3">${e.text}${dayStr}</td></tr>`;

<div style="margin:4px 0 6px;font-size:10px">下記の通り御見積申し上げます。</div>
</div>
<div class="hdr-r">
<div class="co-block">
<img class="stamp-overlay" src="${STAMP}">
<div class="co-text">
<div class="co-name">${CO.name}</div>
${CO.zip}${CO.addr}<br>
${CO.tel}<br>
<div class="lic">${CO.lic1}<br>${CO.lic3}</div>
${tantoStr ? `<div class="tanto">担当　${tantoStr}</div>` : ""}
</div>
</div>
</div></div>
<table class="t">
${d.siteName?`<tr><td class="lb">現場名</td><td colspan="3">${d.siteName}</td></tr>`:""}
${d.siteAddress?`<tr><td class="lb">住所</td><td colspan="3">${d.siteAddress}</td></tr>`:""}
<tr><td class="lb">取引方法</td><td>${d.tradeMethod||"通常取引"}</td><td class="lb">御見積金額<br><span style="font-size:8px;font-weight:normal">${billingLabel}</span></td><td class="amt">¥${fmt(tot)}</td></tr>
${d.validUntil?`<tr><td class="lb">有効期限</td><td colspan="3">${d.validUntil}</td></tr>`:""}
</table>
<table class="t items"><thead><tr><th style="width:34%">品　　名</th><th style="width:10%">数量</th><th style="width:12%">単価</th><th style="width:14%">金額</th><th style="width:30%">備考</th></tr></thead>
<tbody>${rows}${blank}</tbody></table>
<table class="t" style="margin-top:3px">
${d.freq?`<tr><td class="lb">収集日</td><td colspan="3">${d.freq}</td></tr>`:""}
${d.time?`<tr><td class="lb">収集時間</td><td colspan="3">${d.time}</td></tr>`:""}
${d.hol?`<tr><td class="lb">休日</td><td colspan="3">${d.hol}</td></tr>`:""}
${ext}
</table>
${d.note?`<div class="notes"><div class="notes-title">■ 備考・特記事項</div>${d.note}</div>`:""}
<table class="t" style="margin-top:6px;width:50%;margin-left:auto">
<tr class="tot"><td class="lb">小　計</td><td class="r">${fmt(sub)}</td></tr>
<tr class="tot"><td class="lb">消費税(10%)</td><td class="r">${fmt(tax)}</td></tr>
<tr class="tot"><td class="lb" style="font-size:12px">総合計</td><td class="r" style="font-size:14px">¥${fmt(tot)}</td></tr>
</table>
</div>
</body></html>`;
}

function App() {
  const [step, setStep] = useState("select");
  const [d, setD] = useState({
    date: defDate, clientName: "", clientSuffix: "様御中", contactPerson: "",
    siteName: "", siteAddress: "", tradeMethod: "通常取引", validUntil: "",
    items: [{ name: "", qty: "", price: "", remarks: "" }],
    freq: "", time: "", hol: "毎週日曜日、12/31〜1/4",
    extras: DEFAULT_EXTRAS.map(e => ({...e, days: [...e.days]})),
    note: "",
    tantoNames: ["木村","",""],
    billing: "月額",
  });

  const set = (k, v) => setD(p => ({ ...p, [k]: v }));
  const setItem = (i, k, v) => setD(p => { const it = [...p.items]; it[i] = { ...it[i], [k]: v }; return { ...p, items: it }; });
  const addItem = () => setD(p => ({ ...p, items: [...p.items, { name: "", qty: "", price: "", remarks: "" }] }));
  const delItem = i => setD(p => ({ ...p, items: p.items.filter((_, j) => j !== i) }));

  const toggleExtra = i => setD(p => { const e = [...p.extras]; e[i] = {...e[i], on: !e[i].on}; return {...p, extras: e}; });
  const delExtra = i => setD(p => ({ ...p, extras: p.extras.filter((_, j) => j !== i) }));
  const addOptExtra = text => setD(p => {
    if (p.extras.some(e => e.text === text)) return p;
    return { ...p, extras: [...p.extras, { text, on: true, days: [] }] };
  });
  const toggleExtraDay = (i, day) => setD(p => {
    const e = [...p.extras];
    const cur = [...e[i].days];
    const idx = cur.indexOf(day);
    if (idx >= 0) cur.splice(idx, 1); else cur.push(day);
    cur.sort((a,b) => DAYS.indexOf(a) - DAYS.indexOf(b));
    e[i] = {...e[i], days: cur};
    return {...p, extras: e};
  });
  const setTanto = (name) => setD(p => {
    const t = [...p.tantoNames];
    const idx = t.indexOf(name);
    if (idx >= 0) { t[idx] = ""; } else { const empty = t.findIndex(x => !x); if (empty >= 0) t[empty] = name; else t.push(name); }
    return {...p, tantoNames: t};
  });

  const sub = d.items.reduce((s, i) => s + (Number(i.price) * (Number(i.qty) || 1) || 0), 0);
  const tax = Math.floor(sub * 0.1);
  const tot = sub + tax;
  const billingLabel = d.billing !== "一式" ? `（${d.billing}・税込）` : "（税込）";

  const applyPreset = k => {
    const p = PRESETS[k];
    setD(prev => ({ ...prev, items: p.items.map(i => ({ ...i })), freq: p.freq, time: p.time, hol: p.hol,
      extras: DEFAULT_EXTRAS.map(e => ({...e, days: [...e.days]})), note: p.note, billing: p.billing }));
    setStep("edit");
  };

  const doPDF = () => {
    const html = buildHTML(d);
    const blob = new Blob([html], { type: "text/html;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const w = window.open(url, "_blank");
    if (!w) { const a = document.createElement("a"); a.href = url; a.download = "見積書_" + (d.clientName||"新規") + ".html"; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
  };

  const G = "#1a3a2a";
  const inp = { width:"100%",padding:"10px 12px",border:"1px solid #ccc",borderRadius:"8px",fontSize:"16px",fontFamily:"inherit",background:"#fff",boxSizing:"border-box",WebkitAppearance:"none" };
  const lbl = { fontSize:"12px",fontWeight:"600",color:"#666",marginBottom:"4px",display:"block" };
  const sec = { background:"#fff",borderRadius:"14px",padding:"16px",marginBottom:"12px",boxShadow:"0 1px 6px rgba(0,0,0,0.06)" };
  const rw = { marginBottom:"12px" };

  // SELECT
  if (step === "select") return (
    <div style={{ background:"#f4f3ee",minHeight:"100vh" }}>
      <div style={{ background:"linear-gradient(135deg,"+G+" 0%,#2d5a3f 100%)",color:"#fff",padding:"28px 20px 22px",borderRadius:"0 0 20px 20px" }}>
        <div style={{ fontSize:"11px",opacity:0.7,letterSpacing:"3px" }}>大泉衛生株式会社</div>
        <div style={{ fontSize:"26px",fontWeight:"800",marginTop:"4px" }}>見積書作成</div>
        <div style={{ fontSize:"13px",opacity:0.8,marginTop:"4px" }}>見積タイプを選択</div>
      </div>
      <div style={{ padding:"20px 16px",display:"flex",flexDirection:"column",gap:"12px" }}>
        {Object.entries(PRESETS).map(([k,p]) => (
          <button key={k} onClick={() => applyPreset(k)} style={{
            background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:"14px",padding:"20px 16px",
            fontSize:"16px",fontWeight:"700",color:G,cursor:"pointer",
            boxShadow:"0 2px 8px rgba(0,0,0,0.05)",textAlign:"left",lineHeight:"1.4",
          }}>{p.label}</button>
        ))}
      </div>
    </div>
  );

  // PREVIEW
  if (step === "preview") {
    const tantoStr = d.tantoNames.filter(Boolean).join("・");
    const activeExtras = d.extras.filter(e => e.on);
    return (
    <div style={{ background:"#f4f3ee",minHeight:"100vh" }}>
      <div style={{ background:G,color:"#fff",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10 }}>
        <button onClick={() => setStep("edit")} style={{ background:"none",border:"none",color:"#fff",fontSize:"15px",cursor:"pointer" }}>← 編集</button>
        <b>プレビュー</b>
        <button onClick={doPDF} style={{ background:"#4caf50",color:"#fff",border:"none",borderRadius:"8px",padding:"8px 14px",fontWeight:"700",fontSize:"14px",cursor:"pointer" }}>PDF出力</button>
      </div>
      <div style={{ padding:"12px",overflow:"auto" }}>
        <div style={{ background:"#fff",padding:"20px 16px",borderRadius:"10px",boxShadow:"0 2px 12px rgba(0,0,0,0.1)",fontSize:"10px",lineHeight:1.6 }}>
          <div style={{ textAlign:"right",marginBottom:"6px" }}>{d.date}</div>
          <h2 style={{ textAlign:"center",fontSize:"18px",letterSpacing:"8px",borderBottom:"2px solid #222",paddingBottom:"5px",margin:"0 0 10px" }}>御　見　積　書</h2>
          <div style={{ display:"flex",justifyContent:"space-between",gap:"10px",marginBottom:"8px" }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:"14px",fontWeight:"bold",borderBottom:"1px solid #222",paddingBottom:"3px" }}>
                {d.clientName || "（宛名）"} <span style={{ fontSize:"12px",marginLeft:"6px" }}>{d.clientSuffix}</span>
              </div>
              {d.contactPerson && <div style={{ fontSize:"10px",marginTop:"3px" }}>ご担当者様　{d.contactPerson}</div>}
              <div style={{ fontSize:"10px",marginTop:"4px" }}>下記の通り御見積申し上げます。</div>
            </div>
            <div style={{ textAlign:"right",fontSize:"8px",lineHeight:1.5 }}>
              <div style={{ position:"relative",display:"inline-block",padding:"2px 0" }}>
                <img src={STAMP} alt="印" style={{ position:"absolute",top:"46%",right:0,transform:"translateY(-50%)",width:"62px",height:"62px",opacity:0.38,zIndex:2,pointerEvents:"none" }} />
                <div style={{ position:"relative",zIndex:1 }}>
                  <div style={{ fontSize:"13px",fontWeight:"bold",letterSpacing:"3px",marginBottom:"1px" }}>{CO.name}</div>
                  {CO.zip}{CO.addr}<br />{CO.tel}<br />
                  <span style={{ fontSize:"7px" }}>{CO.lic1}<br />{CO.lic3}</span><br />
                  {tantoStr && <span style={{ fontSize:"9px" }}>担当　{tantoStr}</span>}
                </div>
              </div>
            </div>
          </div>
          {d.siteName && <div style={{ fontSize:"10px",marginBottom:"2px" }}><b>現場名：</b>{d.siteName}</div>}
          {d.siteAddress && <div style={{ fontSize:"10px",marginBottom:"4px" }}><b>住所：</b>{d.siteAddress}</div>}
          <div style={{ background:"#fffff0",border:"1px solid #999",padding:"6px 10px",textAlign:"right",fontSize:"16px",fontWeight:"bold",marginBottom:"6px" }}>
            御見積金額{billingLabel}　¥{fmt(tot)}
          </div>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:"9px" }}>
            <thead><tr style={{ background:"#f0f0f0" }}>
              <th style={{ border:"1px solid #999",padding:"3px" }}>品名</th>
              <th style={{ border:"1px solid #999",padding:"3px",width:"36px" }}>数量</th>
              <th style={{ border:"1px solid #999",padding:"3px",width:"48px" }}>単価</th>
              <th style={{ border:"1px solid #999",padding:"3px",width:"56px" }}>金額</th>
            </tr></thead>
            <tbody>
              {d.items.map((it,i) => (
                <tr key={i}><td style={{ border:"1px solid #999",padding:"3px" }}>{it.name}</td>
                <td style={{ border:"1px solid #999",padding:"3px",textAlign:"center" }}>{it.qty}</td>
                <td style={{ border:"1px solid #999",padding:"3px",textAlign:"right" }}>{fmt(it.price)}</td>
                <td style={{ border:"1px solid #999",padding:"3px",textAlign:"right" }}>{fmt(Number(it.price)*(Number(it.qty)||1))}</td></tr>
              ))}
            </tbody>
          </table>
          {d.freq && <div style={{ marginTop:"4px",fontSize:"9px" }}>収集日：{d.freq}　/　時間：{d.time}</div>}
          {d.hol && <div style={{ fontSize:"9px" }}>休日：{d.hol}</div>}
          {activeExtras.map((e,i) => {
            const dayStr = e.days.length > 0 ? "（" + e.days.map(x=>x+"曜").join("・") + "）" : "";
            return <div key={i} style={{ fontSize:"9px" }}>収集品目：{e.text}{dayStr}</div>;
          })}
          {d.note && <div style={{ marginTop:"6px",fontSize:"9px",whiteSpace:"pre-line",border:"2px solid "+G,borderRadius:"4px",padding:"6px 8px",background:"#f9fdf9" }}><b style={{color:G}}>■ 備考・特記事項</b><br/>{d.note}</div>}
          <table style={{ width:"55%",marginLeft:"auto",borderCollapse:"collapse",fontSize:"10px",marginTop:"6px" }}>
            <tbody>
              <tr><td style={{ background:"#f0f0f0",border:"1px solid #999",padding:"3px 6px",fontWeight:"bold" }}>小計</td><td style={{ border:"1px solid #999",padding:"3px 6px",textAlign:"right" }}>{fmt(sub)}</td></tr>
              <tr><td style={{ background:"#f0f0f0",border:"1px solid #999",padding:"3px 6px",fontWeight:"bold" }}>消費税</td><td style={{ border:"1px solid #999",padding:"3px 6px",textAlign:"right" }}>{fmt(tax)}</td></tr>
              <tr><td style={{ background:"#f0f0f0",border:"1px solid #999",padding:"4px 6px",fontWeight:"bold",fontSize:"12px" }}>総合計</td><td style={{ border:"1px solid #999",padding:"4px 6px",textAlign:"right",fontSize:"14px",fontWeight:"bold" }}>¥{fmt(tot)}</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );}

  // EDIT
  const unusedOpts = OPTIONAL_EXTRAS.filter(o => !d.extras.some(e => e.text === o));
  return (
    <div style={{ background:"#f4f3ee",minHeight:"100vh",paddingBottom:"90px" }}>
      <div style={{ background:G,color:"#fff",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10 }}>
        <button onClick={() => setStep("select")} style={{ background:"none",border:"none",color:"#fff",fontSize:"15px",cursor:"pointer" }}>← タイプ</button>
        <b style={{ fontSize:"15px" }}>見積書入力</b>
        <button onClick={() => setStep("preview")} style={{ background:"#4caf50",color:"#fff",border:"none",borderRadius:"8px",padding:"8px 14px",fontWeight:"700",fontSize:"14px",cursor:"pointer" }}>確認 →</button>
      </div>
      <div style={{ background:"#fff",padding:"12px 16px",borderBottom:"1px solid #ddd",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
        <span style={{ fontSize:"13px",color:"#888" }}>御見積金額{billingLabel}</span>
        <span style={{ fontSize:"24px",fontWeight:"800",color:G }}>¥{fmt(tot)}</span>
      </div>
      <div style={{ padding:"12px 16px" }}>
        {/* 基本情報 */}
        <div style={sec}>
          <div style={{ fontSize:"14px",fontWeight:"700",color:G,marginBottom:"12px" }}>📋 基本情報</div>
          <div style={rw}><label style={lbl}>日付</label><input style={inp} value={d.date} onChange={e => set("date",e.target.value)} /></div>
          <div style={{ display:"flex",gap:"8px",...rw }}>
            <div style={{ flex:1 }}><label style={lbl}>宛名</label><input style={inp} value={d.clientName} onChange={e => set("clientName",e.target.value)} placeholder="株式会社○○" /></div>
            <div style={{ width:"100px" }}><label style={lbl}>敬称</label>
              <select style={inp} value={d.clientSuffix} onChange={e => set("clientSuffix",e.target.value)}>
                <option>様御中</option><option>御中</option><option>様</option>
              </select>
            </div>
          </div>
          <div style={rw}><label style={lbl}>先方 担当者名</label><input style={inp} value={d.contactPerson} onChange={e => set("contactPerson",e.target.value)} placeholder="（空欄可）" /></div>
          <div style={rw}><label style={lbl}>現場名</label><input style={inp} value={d.siteName} onChange={e => set("siteName",e.target.value)} placeholder="○○マンション" /></div>
          <div style={rw}><label style={lbl}>現場住所</label><input style={inp} value={d.siteAddress} onChange={e => set("siteAddress",e.target.value)} placeholder="大阪市○○区..." /></div>
          <div style={{ display:"flex",gap:"8px",...rw }}>
            <div style={{ flex:1 }}><label style={lbl}>取引方法</label><input style={inp} value={d.tradeMethod} onChange={e => set("tradeMethod",e.target.value)} /></div>
            <div style={{ flex:1 }}><label style={lbl}>有効期限</label><input style={inp} value={d.validUntil} onChange={e => set("validUntil",e.target.value)} placeholder="（空欄可）" /></div>
          </div>
          <div style={rw}>
            <label style={lbl}>料金区分</label>
            <div style={{ display:"flex",gap:"6px" }}>
              {["月額","年額","一式"].map(b => (
                <button key={b} onClick={() => set("billing",b)} style={{
                  flex:1,padding:"8px",borderRadius:"8px",fontSize:"14px",fontWeight:"600",cursor:"pointer",
                  background:d.billing===b?G:"#f0f0f0",color:d.billing===b?"#fff":"#333",
                  border:d.billing===b?"2px solid "+G:"1px solid #ccc",
                }}>{b}</button>
              ))}
            </div>
          </div>
          <div style={rw}>
            <label style={lbl}>弊社 担当者</label>
            <div style={{ display:"flex",gap:"6px",flexWrap:"wrap" }}>
              {TANTO_LIST.map(name => {
                const active = d.tantoNames.includes(name);
                return (
                  <button key={name} onClick={() => setTanto(name)} style={{
                    padding:"8px 16px",borderRadius:"8px",fontSize:"14px",fontWeight:"600",cursor:"pointer",
                    background:active?G:"#f0f0f0",color:active?"#fff":"#333",
                    border:active?"2px solid "+G:"1px solid #ccc",
                  }}>{name}</button>
                );
              })}
            </div>
            <div style={{ fontSize:"11px",color:"#888",marginTop:"4px" }}>→ 担当　{d.tantoNames.filter(Boolean).join("・")||"（未選択）"}</div>
          </div>
        </div>

        {/* 見積項目 */}
        <div style={sec}>
          <div style={{ fontSize:"14px",fontWeight:"700",color:G,marginBottom:"12px" }}>💰 見積項目</div>
          {d.items.map((it,i) => (
            <div key={i} style={{ background:"#f9f9f6",borderRadius:"10px",padding:"12px",marginBottom:"10px",border:"1px solid #e8e8e0" }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px" }}>
                <span style={{ fontSize:"12px",fontWeight:"700",color:"#888" }}>項目 {i+1}</span>
                {d.items.length > 1 && <button onClick={() => delItem(i)} style={{ background:"#ff5252",color:"#fff",border:"none",borderRadius:"6px",padding:"4px 10px",fontSize:"11px",cursor:"pointer" }}>削除</button>}
              </div>
              <div style={rw}><label style={lbl}>品名</label><input style={inp} value={it.name} onChange={e => setItem(i,"name",e.target.value)} /></div>
              <div style={{ display:"flex",gap:"8px" }}>
                <div style={{ flex:1 }}><label style={lbl}>数量</label><input style={inp} value={it.qty} onChange={e => setItem(i,"qty",e.target.value)} placeholder="1" /></div>
                <div style={{ flex:1 }}><label style={lbl}>単価</label><input style={inp} inputMode="numeric" value={it.price} onChange={e => setItem(i,"price",e.target.value)} placeholder="0" /></div>
              </div>
              <div style={{ ...rw,marginTop:"8px" }}><label style={lbl}>備考</label><input style={inp} value={it.remarks} onChange={e => setItem(i,"remarks",e.target.value)} placeholder="週6回収等" /></div>
              {it.price && it.qty && <div style={{ textAlign:"right",fontSize:"13px",fontWeight:"700",color:G,marginTop:"4px" }}>= ¥{fmt(Number(it.price)*(Number(it.qty)||1))}</div>}
            </div>
          ))}
          <button onClick={addItem} style={{ width:"100%",padding:"10px",background:"#e8f5e9",border:"1px dashed #4caf50",borderRadius:"10px",fontSize:"14px",fontWeight:"600",color:"#2e7d32",cursor:"pointer" }}>＋ 項目を追加</button>
        </div>

        {/* 収集条件 */}
        <div style={sec}>
          <div style={{ fontSize:"14px",fontWeight:"700",color:G,marginBottom:"12px" }}>🚛 収集条件</div>
          <div style={rw}><label style={lbl}>収集日</label><input style={inp} value={d.freq} onChange={e => set("freq",e.target.value)} placeholder="月曜日〜土曜日" /></div>
          <div style={rw}><label style={lbl}>収集時間</label><input style={inp} value={d.time} onChange={e => set("time",e.target.value)} placeholder="24:00〜8:00" /></div>
          <div style={rw}><label style={lbl}>休日</label><input style={inp} value={d.hol} onChange={e => set("hol",e.target.value)} /></div>
        </div>

        {/* 収集品目 */}
        <div style={sec}>
          <div style={{ fontSize:"14px",fontWeight:"700",color:G,marginBottom:"10px" }}>📦 収集品目</div>
          {d.extras.map((e,i) => (
            <div key={i} style={{ marginBottom:"10px",background:e.on?"#e8f5e9":"#f5f5f5",padding:"10px",borderRadius:"10px",border:e.on?"1px solid #a5d6a7":"1px solid #ddd" }}>
              <div style={{ display:"flex",alignItems:"center",gap:"8px" }}>
                <button onClick={() => toggleExtra(i)} style={{ width:"30px",height:"30px",borderRadius:"6px",border:"none",background:e.on?"#4caf50":"#ccc",color:"#fff",fontSize:"16px",cursor:"pointer",flexShrink:0 }}>{e.on?"✓":""}</button>
                <span style={{ flex:1,fontSize:"13px",fontWeight:"600",color:e.on?"#222":"#999" }}>{e.text}</span>
                <button onClick={() => delExtra(i)} style={{ background:"none",border:"none",color:"#999",fontSize:"18px",cursor:"pointer" }}>✕</button>
              </div>
              {e.on && (
                <div style={{ marginTop:"8px",paddingLeft:"38px" }}>
                  <div style={{ fontSize:"11px",color:"#666",marginBottom:"4px" }}>収集曜日：</div>
                  <div style={{ display:"flex",gap:"4px",flexWrap:"wrap" }}>
                    {DAYS.map(day => {
                      const active = e.days.includes(day);
                      return (
                        <button key={day} onClick={() => toggleExtraDay(i,day)} style={{
                          width:"36px",height:"32px",borderRadius:"6px",fontSize:"13px",fontWeight:"600",cursor:"pointer",
                          background:active?G:"#fff",color:active?"#fff":"#555",
                          border:active?"2px solid "+G:"1px solid #ccc",
                        }}>{day}</button>
                      );
                    })}
                  </div>
                  {e.days.length > 0 && <div style={{ fontSize:"11px",color:"#888",marginTop:"4px" }}>→ {e.days.map(x=>x+"曜").join("・")}</div>}
                </div>
              )}
            </div>
          ))}
          {unusedOpts.length > 0 && (
            <div style={{ marginTop:"6px" }}>
              <div style={{ fontSize:"11px",color:"#888",marginBottom:"4px" }}>＋ 品目を追加：</div>
              <div style={{ display:"flex",gap:"6px",flexWrap:"wrap" }}>
                {unusedOpts.map(o => (
                  <button key={o} onClick={() => addOptExtra(o)} style={{
                    padding:"6px 12px",borderRadius:"8px",fontSize:"12px",fontWeight:"600",
                    background:"#fff",border:"1px dashed #4caf50",color:"#2e7d32",cursor:"pointer",
                  }}>＋ {o}</button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* 備考 */}
        <div style={{...sec, border:"2px solid "+G, background:"#f9fdf9"}}>
          <div style={{ fontSize:"14px",fontWeight:"700",color:G,marginBottom:"8px" }}>📝 備考・特記事項</div>
          <div style={{ fontSize:"11px",color:"#888",marginBottom:"8px" }}>※ 見積書下部に枠付きで表示されます</div>
          <textarea style={{ ...inp,minHeight:"100px",resize:"vertical",border:"1.5px solid "+G }} value={d.note} onChange={e => set("note",e.target.value)} placeholder="契約条件、注意事項など" />
        </div>
      </div>

      {/* Bottom bar */}
      <div style={{ position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #ddd",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",zIndex:10 }}>
        <div>
          <div style={{ fontSize:"11px",color:"#888" }}>税込合計{billingLabel}</div>
          <div style={{ fontSize:"20px",fontWeight:"800",color:G }}>¥{fmt(tot)}</div>
        </div>
        <div style={{ display:"flex",gap:"8px" }}>
          <button onClick={() => setStep("preview")} style={{ background:"#f0f0f0",border:"none",borderRadius:"10px",padding:"12px 18px",fontSize:"14px",fontWeight:"600",cursor:"pointer" }}>プレビュー</button>
          <button onClick={doPDF} style={{ background:G,color:"#fff",border:"none",borderRadius:"10px",padding:"12px 18px",fontSize:"14px",fontWeight:"700",cursor:"pointer" }}>PDF出力</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
